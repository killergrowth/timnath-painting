<style>
.main-header { background-color: #201B10 !important; }
.main-header__inner { padding: 0 !important; }
.main-header__logo { display: none !important; }

.gallery-filter-bar { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:36px; }
.filter-btn {
  padding:7px 18px; border-radius:20px; border:1px solid #ddd;
  background:#fff; color:#5a5650; font-size:13px; font-weight:600;
  cursor:pointer; transition:all 0.2s;
}
.filter-btn:hover, .filter-btn.active { background:#AE360E; border-color:#AE360E; color:#fff; }

.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
}
.gallery-card {
  background: #fff; border-radius: 8px; overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  transition: transform 0.2s, box-shadow 0.2s;
}
.gallery-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.14); }
.gallery-card img { width:100%; height:220px; object-fit:cover; display:block; cursor:pointer; }
.gallery-card-body { padding:14px 16px; }
.gallery-card-title { font-weight:600; font-size:14px; color:#201B10; margin-bottom:8px; }
.gallery-card-tags { display:flex; flex-wrap:wrap; gap:5px; }
.gallery-tag {
  background:#f4ede4; color:#AE360E; font-size:11px; font-weight:700;
  padding:3px 10px; border-radius:12px; text-transform:uppercase; letter-spacing:0.5px; cursor:pointer;
}
.gallery-tag:hover { background:#AE360E; color:#fff; }

#lightbox {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,0.92);
  z-index:9999; align-items:center; justify-content:center; padding:20px;
}
#lightbox.open { display:flex; }
#lightbox img { max-height:90vh; max-width:calc(100vw - 120px); object-fit:contain; border-radius:4px; }
#lightbox-close {
  position:absolute; top:20px; right:28px; color:#fff;
  font-size:36px; cursor:pointer; line-height:1; z-index:10001;
}
#lightbox-caption {
  position:absolute; bottom:20px; left:50%; transform:translateX(-50%);
  color:#fff; font-size:14px; background:rgba(0,0,0,0.6);
  padding:8px 18px; border-radius:4px; pointer-events:none;
  white-space:nowrap; max-width:80vw; overflow:hidden; text-overflow:ellipsis;
}
#lightbox-counter {
  position:absolute; top:20px; left:50%; transform:translateX(-50%);
  color:rgba(255,255,255,0.65); font-size:13px; pointer-events:none;
  background:rgba(0,0,0,0.4); padding:4px 12px; border-radius:20px;
}
#lightbox-prev, #lightbox-next {
  position:absolute; top:50%; transform:translateY(-50%);
  background:rgba(255,255,255,0.12); border:none; color:#fff;
  font-size:32px; width:52px; height:52px; border-radius:50%;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:background 0.2s; z-index:10001; user-select:none;
  backdrop-filter:blur(4px); line-height:1;
}
#lightbox-prev { left:16px; }
#lightbox-next { right:16px; }
#lightbox-prev:hover, #lightbox-next:hover { background:rgba(174,54,14,0.8); }
@media (max-width:600px) {
  #lightbox-prev { left:6px; width:40px; height:40px; font-size:24px; }
  #lightbox-next { right:6px; width:40px; height:40px; font-size:24px; }
  #lightbox img { max-width:100vw; }
}

.gallery-empty { text-align:center; padding:80px 20px; color:#999; }
.gallery-empty i { font-size:48px; color:#e4dacc; margin-bottom:16px; display:block; }
.gallery-loading { text-align:center; padding:80px 20px; }
.gallery-loading .spinner {
  width:40px; height:40px; border:3px solid #f4ede4;
  border-top-color:#AE360E; border-radius:50%;
  animation:spin 0.8s linear infinite; margin:0 auto 16px;
}
@keyframes spin { to { transform:rotate(360deg); } }

<script>
function setActiveNav() {
  var path = window.location.pathname.replace(/\/index\.html$/, '/').replace(/\.html$/, '/').replace(/\/?$/, '/');
  document.querySelectorAll('.main-menu__list > li').forEach(function(li) {
    li.classList.remove('current');
    var a = li.querySelector('a');
    if (!a) return;
    var href = (a.getAttribute('href') || '').replace(/\/index\.html$/, '/').replace(/\.html$/, '/').replace(/\/?$/, '/');
    if (!href || href === '#/' || href === '#') return;
    if (path === href || (href.length > 1 && path.startsWith(href))) li.classList.add('current');
  });
}
setActiveNav(); setTimeout(setActiveNav, 200);
</script>
<script>
(function () {
  var activeTag = 'all';
  var allPhotos = [];
  var visiblePhotos = [];
  var currentIndex = 0;

  // â”€â”€ Lightbox â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  function openLightbox(index) {
    currentIndex = index;
    var p = visiblePhotos[currentIndex];
    if (!p) return;
    document.getElementById('lightbox-img').src = '/api/photo/' + p.id;
    document.getElementById('lightbox-img').alt = p.title || 'Project photo';
    document.getElementById('lightbox-caption').textContent = p.title || '';
    document.getElementById('lightbox-counter').textContent = (currentIndex + 1) + ' / ' + visiblePhotos.length;
    var showNav = visiblePhotos.length > 1;
    document.getElementById('lightbox-prev').style.display = showNav ? '' : 'none';
    document.getElementById('lightbox-next').style.display = showNav ? '' : 'none';
    document.getElementById('lightbox').classList.add('open');
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.getElementById('lightbox-img').src = '';
  }

  function showPrev() {
    if (!visiblePhotos.length) return;
    currentIndex = (currentIndex - 1 + visiblePhotos.length) % visiblePhotos.length;
    openLightbox(currentIndex);
  }

  function showNext() {
    if (!visiblePhotos.length) return;
    currentIndex = (currentIndex + 1) % visiblePhotos.length;
    openLightbox(currentIndex);
  }

  document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
  document.getElementById('lightbox-prev').addEventListener('click', function (e) { e.stopPropagation(); showPrev(); });
  document.getElementById('lightbox-next').addEventListener('click', function (e) { e.stopPropagation(); showNext(); });
  document.getElementById('lightbox').addEventListener('click', function (e) {
    if (e.target === this) closeLightbox();
  });
  document.getElementById('lightbox-img').addEventListener('click', function (e) { e.stopPropagation(); });

  // Keyboard navigation
  document.addEventListener('keydown', function (e) {
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') showPrev();
    if (e.key === 'ArrowRight') showNext();
  });

  // Touch swipe
  var touchStartX = 0;
  document.getElementById('lightbox').addEventListener('touchstart', function (e) {
    touchStartX = e.changedTouches[0].clientX;
  }, { passive: true });
  document.getElementById('lightbox').addEventListener('touchend', function (e) {
    var diff = touchStartX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 50) { if (diff > 0) showNext(); else showPrev(); }
  }, { passive: true });

  // â”€â”€ Filtering â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  function setFilter(tag) {
    activeTag = tag;
    document.querySelectorAll('#filterBar .filter-btn').forEach(function (b) {
      b.classList.toggle('active', b.dataset.tag === tag);
    });
    document.querySelectorAll('.gallery-card').forEach(function (card) {
      var tags = JSON.parse(card.dataset.tags || '[]');
      card.style.display = (tag === 'all' || tags.indexOf(tag) !== -1) ? '' : 'none';
    });
    // Keep visiblePhotos in sync so lightbox navigation matches filtered view
    visiblePhotos = (tag === 'all') ? allPhotos.slice() : allPhotos.filter(function (p) {
      return (p.tags || []).indexOf(tag) !== -1;
    });
  }

  function buildFilterBar(photos) {
    var bar = document.getElementById('filterBar');
    var tags = [];
    photos.forEach(function (p) {
      (p.tags || []).forEach(function (t) {
        if (tags.indexOf(t) === -1) tags.push(t);
      });
    });
    bar.innerHTML = '<button class="filter-btn active" data-tag="all">All Projects</button>';
    tags.forEach(function (tag) {
      var btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.dataset.tag = tag;
      btn.textContent = tag;
      bar.appendChild(btn);
    });
    bar.querySelectorAll('.filter-btn').forEach(function (btn) {
      btn.addEventListener('click', function () { setFilter(this.dataset.tag); });
    });
  }

  // â”€â”€ Render â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  function renderPhotos(photos) {
    var container = document.getElementById('galleryContainer');
    if (!photos.length) {
      container.innerHTML = '<div class="gallery-empty"><i class="fa-regular fa-images"></i><p>No photos yet. Check back soon!</p></div>';
      return;
    }
    container.innerHTML = '<div class="gallery-grid" id="galleryGrid"></div>';
    var grid = document.getElementById('galleryGrid');
    photos.forEach(function (p, idx) {
      var card = document.createElement('div');
      card.className = 'gallery-card';
      card.dataset.tags = JSON.stringify(p.tags || []);

      var img = document.createElement('img');
      img.src = '/api/photo/' + p.id;
      img.alt = p.title || 'Project photo';
      img.loading = 'lazy';
      img.addEventListener('click', (function (i) { return function () { openLightbox(i); }; })(idx));

      var body = document.createElement('div');
      body.className = 'gallery-card-body';
      if (p.title) {
        var titleEl = document.createElement('div');
        titleEl.className = 'gallery-card-title';
        titleEl.textContent = p.title;
        body.appendChild(titleEl);
      }
      var tagsEl = document.createElement('div');
      tagsEl.className = 'gallery-card-tags';
      (p.tags || []).forEach(function (t) {
        var span = document.createElement('span');
        span.className = 'gallery-tag';
        span.dataset.tag = t;
        span.textContent = t;
        span.addEventListener('click', function (e) { e.stopPropagation(); setFilter(t); });
        tagsEl.appendChild(span);
      });
      body.appendChild(tagsEl);

      card.appendChild(img);
      card.appendChild(body);
      grid.appendChild(card);
    });
  }

  // â”€â”€ Load â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  fetch('/api/photos')
    .then(function (r) { return r.json(); })
    .then(function (data) {
      allPhotos = data.photos || [];
      visiblePhotos = allPhotos.slice();
      buildFilterBar(allPhotos);
      renderPhotos(allPhotos);
    })
    .catch(function (err) {
      document.getElementById('galleryContainer').innerHTML =
        '<div class="gallery-empty"><i class="fa-solid fa-triangle-exclamation"></i><p>Failed to load photos. Please refresh the page.</p></div>';
      console.error('Gallery load error:', err);
    });
}());
</script>
