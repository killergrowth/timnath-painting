<section class="reviews-section" style="padding:80px 0;background:#f9f5f1;">
<style>
.rv-outer{position:relative;padding:0 56px;}
@media(max-width:599px){.rv-outer{padding:0 40px;}}
.rv-carousel-wrap{overflow:hidden;}
.rv-track{display:flex;transition:transform 0.4s cubic-bezier(0.25,0.46,0.45,0.94);}
.rv-slide{flex:0 0 calc(33.333% - 14px);margin-right:20px;box-sizing:border-box;}
@media(max-width:991px){.rv-slide{flex:0 0 calc(50% - 10px);}}
@media(max-width:599px){.rv-slide{flex:0 0 100%;}}
.rv-card{background:#fff;border-radius:10px;padding:28px 24px;border:1px solid rgba(0,0,0,0.07);height:100%;display:flex;flex-direction:column;}
.rv-cta-card{background:#AE360E;border-radius:10px;padding:28px 24px;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:16px;}
.rv-btn{position:absolute;top:50%;transform:translateY(-50%);width:44px;height:44px;border-radius:50%;border:2px solid #AE360E;background:#fff;color:#AE360E;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:background 0.2s,color 0.2s;flex-shrink:0;z-index:2;}
.rv-btn:hover{background:#AE360E;color:#fff;}
.rv-btn:disabled{opacity:0.35;cursor:default;}
.rv-btn.rv-prev{left:0;}
.rv-btn.rv-next{right:0;}
.rv-dots{display:flex;gap:6px;justify-content:center;margin-top:24px;}
.rv-dot{width:8px;height:8px;border-radius:50%;background:#d4ccc4;border:none;padding:0;cursor:pointer;transition:background 0.2s;}
.rv-dot.active{background:#AE360E;}
</style>
  <div class="container">
    <div class="sec-title text-center" style="margin-bottom:48px;">
      <div class="d-flex align-items-center justify-content-center">
        <h6 class="sec-title__tagline">what our clients say</h6>
      </div>
      <h3 class="sec-title__title">A Painter Near You with 5-Star Reviews</h3>
      <div style="display:inline-flex;align-items:center;gap:6px;margin-top:14px;font-size:15px;color:#5a5650;font-weight:500;">
        Current
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="22" height="22" style="display:inline-block;vertical-align:middle;">
          <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>
          <path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/>
          <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238C29.211 35.091 26.715 36 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/>
          <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303c-.792 2.237-2.231 4.166-4.087 5.571l6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/>
        </svg>
        Rating: <strong style="color:#201B10;"><!-- RATING_VALUE --></strong>
      </div>
    </div>
    <div class="rv-outer">
      <button class="rv-btn rv-prev" id="rv-prev" aria-label="Previous reviews"><i class="fa-solid fa-chevron-left"></i></button>
      <div class="rv-carousel-wrap">
        <div class="rv-track" id="rv-track">
          <!-- REVIEW_CARDS -->
          <div class="rv-slide">
            <div class="rv-cta-card">
              <div style="font-size:32px;color:#fff;"><i class="fa-brands fa-google"></i></div>
              <p style="color:#fff;font-size:16px;font-weight:700;margin:0;line-height:1.3;">See All Our Google Reviews</p>
              <p style="color:rgba(255,255,255,0.8);font-size:13px;margin:0;">39 five-star reviews and counting</p>
              <a href="https://maps.app.goo.gl/ZmPa6ZybegVChtbc9" target="_blank" rel="noopener noreferrer" style="display:inline-block;padding:10px 22px;background:#fff;color:#AE360E;border-radius:100px;font-weight:700;font-size:14px;text-decoration:none;margin-top:4px;">Read Reviews <i class="fa-solid fa-arrow-right"></i></a>
            </div>
          </div>
        </div>
      </div>
      <button class="rv-btn rv-next" id="rv-next" aria-label="Next reviews"><i class="fa-solid fa-chevron-right"></i></button>
    </div>
    <div class="rv-dots" id="rv-dots"></div>
    <div class="text-center" style="margin-top:32px;">
      <a href="https://maps.app.goo.gl/ZmPa6ZybegVChtbc9" target="_blank" rel="noopener noreferrer"
         class="wallox-btn wallox-btn--border">See All Google Reviews <i class="fa-solid fa-arrow-right"></i></a>
    </div>
  </div>
<script>
(function(){
  var track=document.getElementById('rv-track');
  var prevBtn=document.getElementById('rv-prev');
  var nextBtn=document.getElementById('rv-next');
  var dotsWrap=document.getElementById('rv-dots');
  if(!track||!prevBtn||!nextBtn)return;
  var slides=track.querySelectorAll('.rv-slide');
  var total=slides.length;
  if(total<=1){prevBtn.style.display='none';nextBtn.style.display='none';return;}
  function getVisible(){return window.innerWidth<600?1:window.innerWidth<992?2:3;}
  var current=0;
  var pages=0;
  function buildDots(p){
    dotsWrap.innerHTML='';
    for(var i=0;i<p;i++){
      var d=document.createElement('button');
      d.className='rv-dot'+(i===0?' active':'');
      d.setAttribute('aria-label','Page '+(i+1));
      (function(idx){d.addEventListener('click',function(){goTo(idx);});})(i);
      dotsWrap.appendChild(d);
    }
  }
  function goTo(page){
    var v=getVisible();
    pages=Math.max(1,total-v+1);
    if(page<0)page=0;
    if(page>=pages)page=pages-1;
    current=page;
    var slideW=slides[0].getBoundingClientRect().width+20;
    track.style.transform='translateX(-'+(current*slideW)+'px)';
    prevBtn.disabled=(current===0);
    nextBtn.disabled=(current>=pages-1);
    var dots=dotsWrap.querySelectorAll('.rv-dot');
    dots.forEach(function(d,i){d.className='rv-dot'+(i===current?' active':'');});
  }
  function init(){
    var v=getVisible();
    pages=Math.max(1,total-v+1);
    buildDots(pages);
    goTo(0);
  }
  prevBtn.addEventListener('click',function(){goTo(current-1);});
  nextBtn.addEventListener('click',function(){goTo(current+1);});
  window.addEventListener('resize',function(){init();});
  init();
})();
</script>
</section>
