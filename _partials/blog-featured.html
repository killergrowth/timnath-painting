<div class="col-md-4">
  <div style="background:#fff;border-radius:8px;overflow:hidden;border:1px solid #E4DACC;height:100%;display:flex;flex-direction:column;" class="wow fadeInUp" data-wow-duration="1500ms">
    <a href="{{url}}">
      <img loading="lazy" src="{{image}}" alt="{{title}}" title="{{title}}" style="width:100%;height:200px;object-fit:cover;display:block;">
    </a>
    <div style="padding:24px;flex:1;display:flex;flex-direction:column;">
      <div style="font-size:12px;color:#999;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.5px;">{{day}} {{month_year}}</div>
      <h3 style="font-size:16px;font-weight:700;margin:0 0 12px;line-height:1.4;"><a href="{{url}}" style="color:#201B10;text-decoration:none;">{{title}}</a></h3>
      <div style="font-size:14px;color:#666;line-height:1.6;flex:1;">{{excerpt_html}}</div>
      <div style="margin-top:16px;">
        <a href="{{url}}" aria-label="Read more about {{title}}" style="font-size:14px;font-weight:600;color:#AE360E;">Read more <i class="fa-solid fa-arrow-right" style="font-size:11px;"></i></a>
      </div>
    </div>
  </div>
</div>
